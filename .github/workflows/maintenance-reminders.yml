name: Maintenance reminders

# Emails hello@joyjunkremoval.com a MONTHLY maintenance checklist so the owner
# (Ron) is reminded to open a Claude session and run the routine. Self-contained:
# runs on the repo owner's GitHub Actions, sends via Resend. Requires one repo
# secret: RESEND_API_KEY (Settings > Secrets and variables > Actions).
# Manual run (workflow_dispatch) sends the same email as a test.

on:
  schedule:
    - cron: "0 15 1 * *"   # Monthly - 1st of month 15:00 UTC (~8am PT)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Send monthly maintenance reminder via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::error::RESEND_API_KEY secret is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

          SUBJECT="Monthly Joy Junk Removal maintenance is due"
          BODY=$(printf '%s\n' \
            "Time for the MONTHLY Joy Junk Removal routine. Open a Claude session on the project folder and say: run the monthly maintenance." \
            "" \
            "SITE (Claude does it all):" \
            "- Page health check + lead-form/Worker test + IndexNow re-ping." \
            "- Draft 1 season-timed blog post or service-area page; refresh the sitemap." \
            "" \
            "REVIEWS:" \
            "- Claude pulls your latest Google reviews via Apify, adds new 4-5 star ones to the site, and drafts replies." \
            "- Keep texting the Google review link after every job - the #1 lever." \
            "" \
            "GOOGLE BUSINESS PROFILE:" \
            "- Claude drafts a Google post to paste. You: add 2-3 photos, confirm the profile is still live." \
            "" \
            "MEASURE + THINK:" \
            "- Strategy Radar: 1 SEO insight + 1 GBP move + 1 website/CRO improvement (also emailed separately on the 1st)." \
            "- Marketing Performance Log: record GSC / GBP / lead-email / Cloudflare / review numbers vs. baseline (you supply the GSC + GBP numbers)." \
            "" \
            "QUARTERLY (every ~3 months): citation/NAP audit, 1-2 local backlinks, full competitor re-scrape." \
            "" \
            "Full checklist: docs/11_SEO_Maintenance.md in the private joyjunk-ops repo (github.com -> joyjunk-ops -> docs).")

          jq -n \
            --arg from "Joy Junk Removal <leads@send.joyjunkremoval.com>" \
            --arg to "hello@joyjunkremoval.com" \
            --arg subject "$SUBJECT" \
            --arg text "$BODY" \
            '{from: $from, to: [$to], reply_to: $to, subject: $subject, text: $text}' \
          | curl -sS -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              --data @- \
          && echo "Reminder email sent to hello@joyjunkremoval.com."
