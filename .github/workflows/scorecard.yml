name: Monthly Scorecard

# Monthly marketing scorecard, emailed to hello@ on the 1st. Auto-collects:
#   - Web leads        via Resend API         (secret: RESEND_API_KEY)
#   - Site analytics   via Cloudflare GraphQL (secret: CLOUDFLARE_API_TOKEN)
#   - Search data      via GSC API, KEYLESS: GitHub's OIDC identity federates
#     into Google (Workload Identity Federation) and impersonates the
#     scorecard-reader service account — no key file exists anywhere.
#     Config lives in repo VARIABLES (non-secret): GCP_WIF_PROVIDER,
#     GSC_SERVICE_ACCOUNT.
# Remaining blanks (human-only): GBP calls/clicks, review count.
# Each source degrades gracefully — a missing/broken credential shows as a
# note in the email instead of failing the run.
#
# Non-secret config (public by design / visible in URLs):
#   CF_ACCOUNT_TAG - Ron's Cloudflare account id
#   CF_SITE_TAG    - the Web Analytics beacon token embedded in every page
#
# Manual test run: Actions tab -> Monthly Scorecard -> "Run workflow".

on:
  schedule:
    - cron: "45 15 1 * *" # 1st of month, 15:45 UTC (~8:45am Pacific, after the Radar)
  workflow_dispatch: {}

env:
  CF_ACCOUNT_TAG: "141094855901a0327dc6b86e6807259d"
  CF_SITE_TAG: "5879f2e74c1949ac8a1ff5fc80c3b0d9"
  GSC_SITE: "sc-domain:joyjunkremoval.com"

jobs:
  scorecard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # keyless Google auth (Workload Identity Federation)
    steps:
      - name: Count web leads via Resend API
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          CUTOFF=$(date -u -d "30 days ago" +"%Y-%m-%d")
          code=$(curl -s -o emails.json -w "%{http_code}" --max-time 60 \
            "https://api.resend.com/emails?limit=100" \
            -H "Authorization: Bearer $RESEND_API_KEY")
          if [ "$code" = "200" ]; then
            # Subject format is "New lead: <Name> - <Phone>". Anything with
            # "test" in it (any case) is a form test, not a customer - skip it.
            LEADS=$(jq --arg cutoff "$CUTOFF" \
              '[.data[] | select(
                 (.subject | startswith("New lead:")) and
                 (.created_at >= $cutoff) and
                 ((.subject | ascii_downcase | contains("test")) | not)
               )] | length' \
              emails.json)
            echo "LEADS_LINE=- Web leads, last 30 days (via Resend, test submissions excluded): $LEADS" >> "$GITHUB_ENV"
            echo "Leads (tests excluded): $LEADS"
          else
            echo "LEADS_LINE=- Web leads: count unavailable (Resend API HTTP $code)" >> "$GITHUB_ENV"
            echo "::warning::Resend list returned $code"
          fi

      - name: Fetch site analytics via Cloudflare GraphQL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CF_LINE=- Site analytics: not configured yet (add CLOUDFLARE_API_TOKEN secret)" >> "$GITHUB_ENV"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping"
            exit 0
          fi
          # Note: no siteTag filter — the beacon token in the HTML is not the
          # GraphQL siteTag, and listing sites needs an extra token permission.
          # This account has exactly ONE Web Analytics site, so an account-wide
          # aggregate is identical. Add a siteTag filter if more sites appear.
          START=$(date -u -d "30 days ago" +"%Y-%m-%dT%H:%M:%SZ")
          END=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          GQL='query($acct: String!, $start: Time!, $end: Time!) {
            viewer { accounts(filter: {accountTag: $acct}) {
              total: rumPageloadEventsAdaptiveGroups(
                filter: {datetime_geq: $start, datetime_lt: $end}, limit: 1
              ) { count sum { visits } }
              top: rumPageloadEventsAdaptiveGroups(
                filter: {datetime_geq: $start, datetime_lt: $end},
                orderBy: [count_DESC], limit: 1
              ) { count dimensions { requestPath } }
            } }
          }'
          QUERY=$(jq -n --arg q "$GQL" \
                        --arg acct "$CF_ACCOUNT_TAG" \
                        --arg start "$START" --arg end "$END" \
            '{query: $q, variables: {acct: $acct, start: $start, end: $end}}')
          code=$(curl -s -o cf.json -w "%{http_code}" --max-time 60 \
            "https://api.cloudflare.com/client/v4/graphql" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$QUERY")
          ERRS=$(jq -r '.errors // empty | length' cf.json 2>/dev/null || echo "parse")
          if [ "$code" = "200" ] && { [ -z "$ERRS" ] || [ "$ERRS" = "0" ]; }; then
            PV=$(jq -r '.data.viewer.accounts[0].total[0].count // 0' cf.json)
            VISITS=$(jq -r '.data.viewer.accounts[0].total[0].sum.visits // 0' cf.json)
            TOP=$(jq -r '.data.viewer.accounts[0].top[0].dimensions.requestPath // "n/a"' cf.json)
            echo "CF_LINE=- Site (Cloudflare, 30 days): $PV page views / $VISITS referred visits / top page: $TOP" >> "$GITHUB_ENV"
            echo "Cloudflare: $PV views, $VISITS visits, top $TOP"
          else
            echo "CF_LINE=- Site analytics: fetch failed (HTTP $code) - check CLOUDFLARE_API_TOKEN" >> "$GITHUB_ENV"
            echo "::warning::Cloudflare GraphQL failed (HTTP $code):"
            cat cf.json || true
          fi

      - name: Google auth (keyless, Workload Identity Federation)
        id: gauth
        if: vars.GCP_WIF_PROVIDER != ''
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GSC_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/webmasters.readonly

      - name: Fetch search data via Google Search Console API
        env:
          GAUTH_OUTCOME: ${{ steps.gauth.outcome }}
          GSC_TOKEN: ${{ steps.gauth.outputs.access_token }}
          WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
        run: |
          if [ -z "$WIF_PROVIDER" ]; then
            echo "GSC_LINE=- Google Search (GSC): not configured yet (set GCP_WIF_PROVIDER repo variable)" >> "$GITHUB_ENV"
            echo "::notice::GCP_WIF_PROVIDER not set — skipping"
            exit 0
          fi
          if [ "$GAUTH_OUTCOME" != "success" ] || [ -z "$GSC_TOKEN" ]; then
            echo "GSC_LINE=- Google Search (GSC): auth failed - check WIF setup / grant access" >> "$GITHUB_ENV"
            echo "::warning::Google WIF auth did not succeed (outcome: $GAUTH_OUTCOME)"
            exit 0
          fi
          # GSC data lags ~2-3 days; use a 28-day window ending 3 days ago
          END=$(date -u -d "3 days ago" +"%Y-%m-%d")
          START=$(date -u -d "30 days ago" +"%Y-%m-%d")
          SITE=$(printf '%s' "$GSC_SITE" | sed 's/:/%3A/')
          code=$(curl -s -o gsc.json -w "%{http_code}" --max-time 60 -X POST \
            "https://www.googleapis.com/webmasters/v3/sites/$SITE/searchAnalytics/query" \
            -H "Authorization: Bearer $GSC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"startDate\": \"$START\", \"endDate\": \"$END\"}")
          if [ "$code" != "200" ]; then
            echo "GSC_LINE=- Google Search (GSC): fetch failed (HTTP $code) - is scorecard-reader added as a Search Console user?" >> "$GITHUB_ENV"
            echo "::warning::GSC query returned $code:"
            cat gsc.json
            exit 0
          fi
          IMP=$(jq -r '.rows[0].impressions // 0 | floor' gsc.json)
          CLK=$(jq -r '.rows[0].clicks // 0 | floor' gsc.json)
          POS=$(jq -r '.rows[0].position // 0 | (. * 10 | floor) / 10' gsc.json)
          echo "GSC_LINE=- Google Search (GSC, 28 days to $END): $IMP impressions / $CLK clicks / avg position $POS" >> "$GITHUB_ENV"
          echo "GSC: $IMP impressions, $CLK clicks, position $POS"

      - name: Fetch last month's numbers for comparison
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          # Pull the previous scorecard email back out of Resend and quote its
          # AUTO-COLLECTED block, so this month's email shows both side by side.
          : > prev_block.txt
          LAST_ID=$(curl -s --max-time 60 "https://api.resend.com/emails?limit=100" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            | jq -r '[.data[] | select(.subject | startswith("Monthly Scorecard"))][0].id // empty')
          if [ -n "$LAST_ID" ]; then
            curl -s --max-time 60 "https://api.resend.com/emails/$LAST_ID" \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              | jq -r '.text // empty' \
              | sed -n '/^AUTO-COLLECTED/,/^FILL IN/p' | sed '$d' | tail -n +2 > prev_block.txt
            echo "Previous scorecard found — comparison block: $(wc -l < prev_block.txt | tr -d ' ') lines"
          else
            echo "No previous scorecard found — first run"
          fi

      - name: Email the scorecard via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          MONTH=$(date -u +'%B %Y')
          {
            echo "JOY JUNK REMOVAL - MONTHLY SCORECARD ($MONTH)"
            echo ""
            echo "THIS MONTH (auto-collected):"
            echo "${LEADS_LINE:-- Web leads: unavailable}"
            echo "${CF_LINE:-- Site analytics: unavailable}"
            echo "${GSC_LINE:-- Google Search: unavailable}"
            if [ -s prev_block.txt ]; then
              echo ""
              echo "LAST MONTH (same numbers then, for comparison):"
              cat prev_block.txt
            fi
            echo ""
            echo "FILL IN (about 1 minute, hello@ logins):"
            echo ""
            echo "1. Google Business Profile - business.google.com -> Performance:"
            echo "   calls ___ / website clicks ___"
            echo ""
            echo "2. Google reviews - google 'Joy Junk Removal':"
            echo "   total ___ (note how many are real customers vs friends)"
            echo ""
            echo "THEN LOG IT: open a Claude session on the project and say:"
            echo "  log the scorecard: <paste your numbers>"
            echo "Claude writes the month's entry and the month-over-month analysis."
            echo ""
            echo "MONTHLY DEEP WORK (same session, once a month): say"
            echo "  run the monthly maintenance"
            echo "Claude re-runs the competitor review scraper on NEW reviews only and"
            echo "proposes: new website FAQ items, new GBP Q&A, and new keywords -"
            echo "for your approval before anything changes."
            echo ""
            echo "----"
            echo "Full history + month-over-month analysis lives in the private repo:"
            echo "github.com/thicktreasure365/joyjunkremoval-ops -> docs/12_Marketing_Performance_Log.md"
          } > body.txt

          jq -n \
            --arg from "Joy Junk Removal <leads@send.joyjunkremoval.com>" \
            --arg to "hello@joyjunkremoval.com" \
            --arg subject "Monthly Scorecard - $MONTH" \
            --rawfile text body.txt \
            '{from: $from, to: [$to], reply_to: $to, subject: $subject, text: $text}' > email.json

          code=$(curl -s -o resend.json -w "%{http_code}" -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d @email.json)
          if [ "$code" != "200" ] && [ "$code" != "201" ]; then
            echo "::error::Resend returned HTTP $code"
            cat resend.json
            exit 1
          fi
          echo "Scorecard emailed to hello@joyjunkremoval.com"

      - name: Alert hello@ on failure (via Resend)
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          jq -n \
            --arg from "Joy Junk Removal <leads@send.joyjunkremoval.com>" \
            --arg to "hello@joyjunkremoval.com" \
            --arg subject "ALERT: Monthly Scorecard failed - no scorecard email this month" \
            --arg text "The monthly scorecard automation failed. The website itself is unaffected - this is not urgent. You can still collect the numbers manually (GSC, GBP, Cloudflare, reviews, lead emails). Details: https://github.com/jjremoval/joyjunkremoval/actions/runs/${{ github.run_id }}" \
            '{from: $from, to: [$to], reply_to: $to, subject: $subject, text: $text}' \
          | curl -s -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              -d @- \
          && echo "" && echo "Failure alert sent to hello@"
